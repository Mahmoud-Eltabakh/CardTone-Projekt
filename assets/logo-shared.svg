<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 260" width="240" height="260">
  <defs>

    <!-- ═══ FILTERS ═══ -->

    <!-- Deep neumorphic lift for card -->
    <filter id="card-lift" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" result="b1"/>
      <feOffset dx="10" dy="12" in="b1" result="s1"/>
      <feFlood flood-color="#1A1040" flood-opacity="0.45" result="c1"/>
      <feComposite in="c1" in2="s1" operator="in" result="darkShadow"/>

      <feGaussianBlur in="SourceAlpha" stdDeviation="10" result="b2"/>
      <feOffset dx="-8" dy="-8" in="b2" result="s2"/>
      <feFlood flood-color="#FFFFFF" flood-opacity="0.55" result="c2"/>
      <feComposite in="c2" in2="s2" operator="in" result="lightHighlight"/>

      <feMerge>
        <feMergeNode in="darkShadow"/>
        <feMergeNode in="lightHighlight"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Inset pressed shadow -->
    <filter id="inset-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="b"/>
      <feOffset dx="3" dy="3" in="b"/>
      <feComposite in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1" result="sh"/>
      <feFlood flood-color="#0D0820" flood-opacity="0.35"/>
      <feComposite in2="sh" operator="in" result="s2"/>
      <feMerge><feMergeNode in="s2"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Aurora glow bloom -->
    <filter id="aurora-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Bar prismatic glow -->
    <filter id="bar-prism" x="-100%" y="-40%" width="300%" height="180%">
      <feGaussianBlur stdDeviation="4" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft text glow -->
    <filter id="text-glow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- NFC ring pulse glow -->
    <filter id="nfc-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- ═══ GRADIENTS ═══ -->

    <!-- Card body: dark premium glassmorphic -->
    <linearGradient id="card-body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1E1A3A"/>
      <stop offset="40%"  stop-color="#16213E"/>
      <stop offset="100%" stop-color="#0A0A1A"/>
    </linearGradient>

    <!-- Card sheen: iridescent top-left highlight -->
    <linearGradient id="card-sheen" x1="0%" y1="0%" x2="60%" y2="60%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="50%"  stop-color="#A78BFA" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.00"/>
    </linearGradient>

    <!-- Card face: deep inset -->
    <linearGradient id="card-face" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#110E2A"/>
      <stop offset="100%" stop-color="#0D0B1E"/>
    </linearGradient>

    <!-- Aurora backdrop behind card -->
    <radialGradient id="aurora1" cx="30%" cy="60%" r="55%">
      <stop offset="0%"   stop-color="#7C3AED" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0.00"/>
    </radialGradient>
    <radialGradient id="aurora2" cx="70%" cy="40%" r="50%">
      <stop offset="0%"   stop-color="#06B6D4" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0.00"/>
    </radialGradient>
    <radialGradient id="aurora3" cx="50%" cy="80%" r="45%">
      <stop offset="0%"   stop-color="#F59E0B" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0.00"/>
    </radialGradient>

    <!-- Bar 1: electric magenta -->
    <linearGradient id="b1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#F472B6"/>
      <stop offset="50%"  stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#9D174D"/>
    </linearGradient>
    <!-- Bar 2: electric amber -->
    <linearGradient id="b2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FCD34D"/>
      <stop offset="50%"  stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#92400E"/>
    </linearGradient>
    <!-- Bar 3: electric cyan (tallest) -->
    <linearGradient id="b3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#67E8F9"/>
      <stop offset="40%"  stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#164E63"/>
    </linearGradient>
    <!-- Bar 4: electric emerald -->
    <linearGradient id="b4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#6EE7B7"/>
      <stop offset="50%"  stop-color="#10B981"/>
      <stop offset="100%" stop-color="#064E3B"/>
    </linearGradient>
    <!-- Bar 5: electric violet -->
    <linearGradient id="b5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#C4B5FD"/>
      <stop offset="50%"  stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#3B0764"/>
    </linearGradient>

    <!-- Wordmark: prismatic rainbow sweep -->
    <linearGradient id="wordmark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#F472B6"/>
      <stop offset="25%"  stop-color="#FCD34D"/>
      <stop offset="50%"  stop-color="#67E8F9"/>
      <stop offset="75%"  stop-color="#6EE7B7"/>
      <stop offset="100%" stop-color="#C4B5FD"/>
    </linearGradient>

    <!-- NFC ring gradient -->
    <linearGradient id="nfc-ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#67E8F9" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.5"/>
    </linearGradient>

    <!-- Card edge highlight (top rim) -->
    <linearGradient id="rim" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.0"/>
      <stop offset="30%"  stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="70%"  stop-color="#A78BFA" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.0"/>
    </linearGradient>

  </defs>

  <!-- ═══ AURORA BACKDROP ═══ -->
  <ellipse cx="80"  cy="155" rx="75" ry="55" fill="url(#aurora1)" filter="url(#aurora-glow)"/>
  <ellipse cx="165" cy="110" rx="65" ry="50" fill="url(#aurora2)" filter="url(#aurora-glow)"/>
  <ellipse cx="120" cy="190" rx="60" ry="35" fill="url(#aurora3)" filter="url(#aurora-glow)"/>

  <!-- ═══ CARD BODY (tilted, 3D perspective skew) ═══ -->
  <!-- Slight parallelogram skew to suggest 3D tilt -->
  <g transform="skewY(-2) translate(0, 4)">

    <!-- Card drop shadow layer -->
    <rect x="44" y="34" width="152" height="178" rx="22" ry="22"
          fill="#000000" opacity="0.55" filter="url(#card-lift)"
          transform="translate(6,10)"/>

    <!-- Card body -->
    <rect x="44" y="34" width="152" height="178" rx="22" ry="22"
          fill="url(#card-body)" filter="url(#card-lift)"/>

    <!-- Iridescent sheen overlay -->
    <rect x="44" y="34" width="152" height="178" rx="22" ry="22"
          fill="url(#card-sheen)"/>

    <!-- Top rim highlight line -->
    <rect x="54" y="34" width="132" height="3" rx="1.5"
          fill="url(#rim)" opacity="0.9"/>

    <!-- Card inset face -->
    <rect x="58" y="50" width="124" height="146" rx="14" ry="14"
          fill="url(#card-face)" filter="url(#inset-shadow)"/>

    <!-- ═══ NFC TAP RINGS (top-right corner, subtle) ═══ -->
    <g opacity="0.55" filter="url(#nfc-glow)">
      <circle cx="168" cy="68" r="8"  fill="none" stroke="url(#nfc-ring)" stroke-width="1.2"/>
      <circle cx="168" cy="68" r="13" fill="none" stroke="url(#nfc-ring)" stroke-width="0.9" opacity="0.7"/>
      <circle cx="168" cy="68" r="18" fill="none" stroke="url(#nfc-ring)" stroke-width="0.6" opacity="0.4"/>
    </g>

    <!-- ═══ SOUND WAVE BARS ═══ -->
    <!-- All bars bottom-aligned at y=186, heights vary -->

    <!-- Bar 1 — magenta, h=34 -->
    <rect x="76"  y="152" width="16" height="34" rx="8" fill="url(#b1)" filter="url(#bar-prism)"/>
    <!-- Bar 2 — amber, h=54 -->
    <rect x="97"  y="132" width="16" height="54" rx="8" fill="url(#b2)" filter="url(#bar-prism)"/>
    <!-- Bar 3 — cyan, h=80 (tallest, center) -->
    <rect x="118" y="106" width="16" height="80" rx="8" fill="url(#b3)" filter="url(#bar-prism)"/>
    <!-- Bar 4 — emerald, h=54 -->
    <rect x="139" y="132" width="16" height="54" rx="8" fill="url(#b4)" filter="url(#bar-prism)"/>
    <!-- Bar 5 — violet, h=34 -->
    <rect x="160" y="152" width="16" height="34" rx="8" fill="url(#b5)" filter="url(#bar-prism)"/>

    <!-- Glowing orbs at the top of each bar -->
    <circle cx="84"  cy="149" r="7"   fill="#F472B6" opacity="0.95" filter="url(#bar-prism)"/>
    <circle cx="105" cy="129" r="7.5" fill="#FCD34D" opacity="0.95" filter="url(#bar-prism)"/>
    <circle cx="126" cy="103" r="9"   fill="#67E8F9" opacity="1.00" filter="url(#bar-prism)"/>
    <circle cx="147" cy="129" r="7.5" fill="#6EE7B7" opacity="0.95" filter="url(#bar-prism)"/>
    <circle cx="168" cy="149" r="7"   fill="#C4B5FD" opacity="0.95" filter="url(#bar-prism)"/>

    <!-- Inner orb highlight dots (lens flare feel) -->
    <circle cx="82"  cy="147" r="2.5" fill="#FFFFFF" opacity="0.70"/>
    <circle cx="103" cy="127" r="2.5" fill="#FFFFFF" opacity="0.70"/>
    <circle cx="124" cy="101" r="3"   fill="#FFFFFF" opacity="0.80"/>
    <circle cx="145" cy="127" r="2.5" fill="#FFFFFF" opacity="0.70"/>
    <circle cx="166" cy="147" r="2.5" fill="#FFFFFF" opacity="0.70"/>

    <!-- ═══ FLOATING LIGHT PARTICLES ═══ -->
    <circle cx="70"  cy="80"  r="1.5" fill="#F472B6" opacity="0.6"/>
    <circle cx="175" cy="95"  r="1.2" fill="#67E8F9" opacity="0.5"/>
    <circle cx="65"  cy="160" r="1.0" fill="#FCD34D" opacity="0.4"/>
    <circle cx="178" cy="170" r="1.5" fill="#6EE7B7" opacity="0.5"/>
    <circle cx="90"  cy="58"  r="1.0" fill="#C4B5FD" opacity="0.55"/>
    <circle cx="155" cy="56"  r="1.2" fill="#F472B6" opacity="0.45"/>
    <circle cx="72"  cy="130" r="0.9" fill="#67E8F9" opacity="0.40"/>

  </g>

  <!-- ═══ WORDMARK ═══ -->
  <!-- Shadow layer -->
  <text x="120" y="234"
        font-family="'Arial Rounded MT Bold','Helvetica Neue',Arial,sans-serif"
        font-size="20" font-weight="900"
        fill="#000000" opacity="0.4"
        text-anchor="middle" letter-spacing="5"
        transform="translate(1,2)">CARDTONE</text>
  <!-- Main text with prismatic gradient -->
  <text x="120" y="234"
        font-family="'Arial Rounded MT Bold','Helvetica Neue',Arial,sans-serif"
        font-size="20" font-weight="900"
        fill="url(#wordmark)"
        text-anchor="middle" letter-spacing="5"
        filter="url(#text-glow)">CARDTONE</text>

</svg>
